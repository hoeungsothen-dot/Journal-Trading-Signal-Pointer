<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f85149"/>
      <stop offset="100%" style="stop-color:#da3633"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect width="512" height="512" rx="100" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  
  <!-- Candlestick chart -->
  <!-- Candle 1 - bearish -->
  <line x1="110" y1="160" x2="110" y2="340" stroke="#f85149" stroke-width="3" opacity="0.6"/>
  <rect x="94" y="195" width="32" height="110" rx="4" fill="url(#red)" opacity="0.85"/>
  
  <!-- Candle 2 - bullish tall -->
  <line x1="180" y1="130" x2="180" y2="360" stroke="#3fb950" stroke-width="3" opacity="0.6"/>
  <rect x="164" y="155" width="32" height="175" rx="4" fill="url(#green)" opacity="0.9"/>

  <!-- Candle 3 - bearish small -->
  <line x1="250" y1="180" x2="250" y2="330" stroke="#f85149" stroke-width="3" opacity="0.6"/>
  <rect x="234" y="210" width="32" height="90" rx="4" fill="url(#red)" opacity="0.7"/>

  <!-- Candle 4 - bullish big -->
  <line x1="320" y1="110" x2="320" y2="350" stroke="#3fb950" stroke-width="3" opacity="0.6"/>
  <rect x="304" y="135" width="32" height="190" rx="4" fill="url(#green)"/>

  <!-- Candle 5 - neutral/small bullish -->
  <line x1="390" y1="150" x2="390" y2="310" stroke="#58a6ff" stroke-width="3" opacity="0.6"/>
  <rect x="374" y="175" width="32" height="115" rx="4" fill="url(#accent)" opacity="0.8"/>

  <!-- Trend line overlay -->
  <polyline points="110,305 180,190 250,250 320,170 390,200" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- Book/journal icon bottom right -->
  <rect x="330" y="340" width="120" height="98" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="2"/>
  <line x1="380" y1="340" x2="380" y2="438" stroke="#21262d" stroke-width="2"/>
  <line x1="345" y1="362" x2="370" y2="362" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>
  <line x1="345" y1="376" x2="370" y2="376" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <line x1="345" y1="390" x2="370" y2="390" stroke="#3fb950" stroke-width="2" opacity="0.7"/>
  <line x1="345" y1="404" x2="370" y2="404" stroke="#3fb950" stroke-width="2" opacity="0.5"/>
  <line x1="390" y1="362" x2="432" y2="362" stroke="#484f58" stroke-width="2" opacity="0.6"/>
  <line x1="390" y1="376" x2="420" y2="376" stroke="#484f58" stroke-width="2" opacity="0.6"/>
  <line x1="390" y1="390" x2="432" y2="390" stroke="#484f58" stroke-width="2" opacity="0.6"/>
  <line x1="390" y1="404" x2="415" y2="404" stroke="#484f58" stroke-width="2" opacity="0.6"/>
</svg>
